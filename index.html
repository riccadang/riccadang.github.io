<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Scuole v1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --surface: #ffffff;
            --surface2: #eeebe6;
            --border: #dbd8d2;
            --accent: #d94820;
            --accent2: #e8960f;
            --text: #1a1916;
            --dim: #8c8a84;
            --mid: #4a4845;
            --fh: 'Syne', sans-serif;
            --fb: 'DM Sans', sans-serif;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 4px 12px rgba(0, 0, 0, .05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--fb);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            box-shadow: 2px 0 12px rgba(0, 0, 0, .07);
        }

        #hdr {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        #hdr h1 {
            font-family: var(--fh);
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -.5px;
            line-height: 1.1;
        }

        #hdr h1 em {
            color: var(--accent);
            font-style: normal;
        }

        #hdr p {
            font-size: 10px;
            color: var(--dim);
            margin-top: 4px;
            letter-spacing: .6px;
            text-transform: uppercase;
        }

        /* load file banner — shown only before JSON is loaded */
        #load-banner {
            margin: 10px 14px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 18px 14px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s;
        }

        #load-banner:hover {
            border-color: var(--accent);
        }

        #load-banner svg {
            display: block;
            margin: 0 auto 8px;
            opacity: .5;
        }

        #load-banner p {
            font-size: 12px;
            color: var(--mid);
        }

        #load-banner span {
            font-size: 10px;
            color: var(--dim);
            display: block;
            margin-top: 3px;
        }

        #file-input {
            display: none;
        }

        #stats {
            padding: 8px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .sv {
            font-family: var(--fh);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .sl {
            font-size: 9px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-top: 2px;
        }

        .sd {
            width: 1px;
            height: 26px;
            background: var(--border);
        }

        #srch {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        #srch input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--fb);
            font-size: 13px;
            padding: 7px 11px;
            border-radius: 6px;
            outline: none;
            transition: border-color .2s;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, .04);
        }

        #srch input::placeholder {
            color: var(--dim);
        }

        #srch input:focus {
            border-color: var(--accent);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, .04), 0 0 0 3px rgba(217, 72, 32, .1);
        }

        #fsec {
            padding: 10px 14px 8px;
            border-bottom: 1px solid var(--border);
        }

        #fsec h3 {
            font-family: var(--fh);
            font-size: 9px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
            font-weight: 600;
        }

        #fgrid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .db {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--mid);
            font-family: var(--fh);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 7px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .12s;
        }

        .db:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #fff;
        }

        .db.on {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        #clf {
            margin-top: 7px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            font-family: var(--fb);
            font-size: 11px;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: all .15s;
        }

        #clf:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #fff5f3;
        }

        #lw {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        #lw::-webkit-scrollbar {
            width: 3px;
        }

        #lw::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .si {
            padding: 9px 14px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .1s;
        }

        .si:hover,
        .si.on {
            background: var(--surface2);
            border-left-color: var(--accent);
        }

        .si .sn {
            font-family: var(--fh);
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
        }

        .si .sa {
            font-size: 11px;
            color: var(--dim);
            margin-top: 2px;
        }

        .si .sb {
            display: inline-block;
            font-family: var(--fh);
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 2px;
            margin-top: 3px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--dim);
        }

        .si:hover .sb,
        .si.on .sb {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        #empty {
            text-align: center;
            padding: 36px 16px;
            color: var(--dim);
            font-size: 12px;
            display: none;
        }

        /* ── MAP ── */
        #mw {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Leaflet dark theme overrides */
        .leaflet-popup-content-wrapper {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 28px rgba(0, 0, 0, .15) !important;
            color: var(--text) !important;
            width: 400px;
        }

        .leaflet-popup-tip {
            background: var(--surface) !important;
        }

        .leaflet-popup-content {
            margin: 12px 15px !important;
            width: 380px !important;
            font-family: var(--fb) !important;
        }

        .pn {
            font-family: var(--fh);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 3px;
            color: var(--text);
        }

        .pa {
            font-size: 12px;
            color: var(--mid);
            margin-bottom: 7px;
        }

        .pd {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-family: var(--fh);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
        }

        .leaflet-control-attribution {
            background: rgba(255, 255, 255, .75) !important;
            color: #999 !important;
            font-size: 9px !important;
        }

        .leaflet-control-attribution a {
            color: #999 !important;
        }

        .leaflet-control-zoom a {
            background: #fff !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--surface2) !important;
        }

        /* ── LAYER CONTROLS ── */
        #layer-ctrl {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .lsect {
            font-family: var(--fh);
            font-size: 9px;
            letter-spacing: .8px;
            text-transform: uppercase;
            color: var(--dim);
            padding: 0 2px;
            margin-top: 4px;
        }

        .lsect:first-child {
            margin-top: 0;
        }

        .lsep {
            height: 1px;
            background: var(--border);
            margin: 3px 0;
        }

        .lbtn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--mid);
            font-family: var(--fh);
            font-size: 10px;
            font-weight: 600;
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s;
            box-shadow: var(--shadow);
            white-space: nowrap;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .lbtn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .lbtn.on {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(217, 72, 32, .3);
        }

        .lico {
            font-size: 13px;
            line-height: 1;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div id="hdr">
            <h1>Mappa <em>Scuole</em> v1</h1>
        </div>



        <div id="stats">
            <div>
                <div class="sv" id="stot">0</div>
                <div class="sl">Totale</div>
            </div>
            <div class="sd"></div>
            <div>
                <div class="sv" id="svis">0</div>
                <div class="sl">Filtrate</div>
            </div>
            <div class="sd"></div>
            <div>
                <div class="sv" id="sdist">0</div>
                <div class="sl">Distretti</div>
            </div>
        </div>

        <div id="srch">
            <input id="qi" type="text" placeholder="Cerca scuola o indirizzo…">
        </div>

        <div id="fsec">
            <h3>Filtra per Distretto</h3>
            <div id="fgrid"></div>
            <button id="clf">✕ Tutti i distretti</button>
        </div>

        <div id="lw">
            <div id="sl"></div>
            <div id="empty">Nessuna scuola trovata</div>
        </div>
    </div>

    <div id="mw">
        <div id="map"></div>

        <div id="layer-ctrl">
            <div class="lsect">Mappa base</div>
            <button class="lbtn on" id="btn-light" onclick="setBase('light')"><span class="lico">☀️</span>Standard</button>
            <button class="lbtn" id="btn-osm" onclick="setBase('osm')"><span class="lico">🗺️</span>Trasporti</button>
            <button class="lbtn" id="btn-osm1" onclick="setBase('osm1')"><span class="lico">🏔️</span>Classica 1</button>
            <button class="lbtn" id="btn-osm" onclick="setBase('topo')"><span class="lico">🏔️</span>Classica 2</button>


          

        </div>
    </div>
    //
    <script>
        // https://wiki.openstreetmap.org/wiki/Raster_tile_providers
        // ── MAP INIT ──────────────────────────────────────────────────────────────────
        const map = L.map('map', { center: [41.9, 12.5], zoom: 11 });

        const BASES = {
            light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 19
            }),
            osm: L.tileLayer('https://tile.thunderforest.com/transport/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors', maxZoom: 19
            }),
            
            osm1: L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors', maxZoom: 19
            }),
            
            topo: L.tileLayer('https://maps.geoapify.com/v1/tile/osm-bright-smooth/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors, © OpenTopoMap', maxZoom: 19
            })
        };



        let currentBase = 'light';
        let activeOverlays = new Set();
        BASES.light.addTo(map);

        function setBase(name) {
            if (currentBase === name) return;
            map.removeLayer(BASES[currentBase]);
            BASES[name].addTo(map);
            activeOverlays.forEach(o => { map.removeLayer(OVERLAYS[o]); OVERLAYS[o].addTo(map); });
            currentBase = name;
            ['light', 'osm', 'topo'].forEach(n => document.getElementById('btn-' + n).classList.toggle('on', n === name));
        }

        function togOverlay(name) {
            const btn = document.getElementById('btn-' + name);
            if (activeOverlays.has(name)) {
                map.removeLayer(OVERLAYS[name]);
                activeOverlays.delete(name);
                btn.classList.remove('on');
            } else {
                OVERLAYS[name].addTo(map);
                activeOverlays.add(name);
                btn.classList.add('on');
            }
        }

        // ── STATE ─────────────────────────────────────────────────────────────────────
        let schools = [], selId = null, actDist = new Set(), query = '';
        const ml = L.layerGroup().addTo(map);
        const mmap = {};

        // District color palette (35 colors)
        const PAL = [
            '#e8532a', '#f5a623', '#4ecdc4', '#45b7d1', '#96ceb4', '#88d8b0', '#ff6b6b',
            '#c7f464', '#a29bfe', '#fd79a8', '#00cec9', '#6c5ce7', '#fab1a0', '#81ecec',
            '#55efc4', '#fdcb6e', '#e17055', '#74b9ff', '#0984e3', '#00b894', '#d63031',
            '#e84393', '#b2bec3', '#f39c12', '#8e44ad', '#27ae60', '#e74c3c', '#3498db',
            '#1abc9c', '#9b59b6', '#f1c40f', '#2980b9', '#16a085', '#c0392b', '#7f8c8d'
        ];
        let DC = {};

        // ── MARKER ICON ───────────────────────────────────────────────────────────────
        function mkIcon(col) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 20 26">
    <circle cx="10" cy="10" r="9" fill="${col}" stroke="rgba(0,0,0,0.5)" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3.5" fill="rgba(0,0,0,0.45)"/>
    <line x1="10" y1="19" x2="10" y2="26" stroke="${col}" stroke-width="2.5"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-36] });
}

        // ── FILTERING ─────────────────────────────────────────────────────────────────
        function getFiltered() {
            return schools.filter(s => {
                if (actDist.size > 0 && !actDist.has(String(s.distretto))) return false;
                if (query) {
                    const q = query.toLowerCase();
                    if (!s.scuola.toLowerCase().includes(q) && !s.indirizzo.toLowerCase().includes(q)) return false;
                }
                return true;
            });
        }

        // ── RENDER MARKERS ────────────────────────────────────────────────────────────
        function renderMarkers() {
            ml.clearLayers();
            Object.keys(mmap).forEach(k => delete mmap[k]);
            getFiltered().forEach(s => {
                const m = L.marker([s.latitudine, s.longitudine], { icon: mkIcon(DC[s.distretto] || PAL[0]) });
                m.bindPopup(`
      <div class="pn">${s.scuola} (${s.codice_scuola})</div>
      <div class="pa">${s.comune} | ${s.indirizzo}</div>
      <span class="pd">Distretto ${s.distretto}</span>
    `);
                m.on('click', () => hlItem(s._id));
                mmap[s._id] = m;
                ml.addLayer(m);
            });
        }

        // ── RENDER LIST ───────────────────────────────────────────────────────────────
        function renderList() {
            const f = getFiltered();
            document.getElementById('stot').textContent = schools.length;
            document.getElementById('svis').textContent = f.length;

            const list = document.getElementById('sl');
            const emp = document.getElementById('empty');

            if (!f.length) { list.innerHTML = ''; emp.style.display = 'block'; return; }
            emp.style.display = 'none';
            list.innerHTML = f.map(s => `
    <div class="si ${selId === s._id ? 'on' : ''}" data-id="${s._id}" onclick="pickSchool(${s._id})">
      <div class="sn">${s.scuola}</div>
      <div class="sa">${s.indirizzo}</div>
      <span class="sb">Distretto ${s.distretto}</span>
    </div>
  `).join('');
        }

        // ── INTERACTIONS ──────────────────────────────────────────────────────────────
        window.pickSchool = function (id) {
            const s = schools.find(x => x._id === id);
            if (!s) return;
            selId = id; renderList();
            map.flyTo([s.latitudine, s.longitudine], 16, { duration: 0.7 });
            const m = mmap[id];
            if (m) setTimeout(() => m.openPopup(), 750);
        };

        function hlItem(id) {
            selId = id; renderList();
            const el = document.querySelector(`.si[data-id="${id}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.togDist = function (d) {
            actDist.has(d) ? actDist.delete(d) : actDist.add(d);
            document.querySelectorAll('.db').forEach(b => b.classList.toggle('on', actDist.has(b.dataset.d)));
            renderList(); renderMarkers();
            if (actDist.size > 0) {
                const pts = getFiltered();
                if (pts.length) map.fitBounds(L.latLngBounds(pts.map(s => [s.latitudine, s.longitudine])), { padding: [50, 50] });
            }
        };

        document.getElementById('clf').onclick = () => {
            actDist.clear();
            document.querySelectorAll('.db').forEach(b => b.classList.remove('on'));
            renderList(); renderMarkers();
            fitAll();
        };

        document.getElementById('qi').oninput = e => {
            query = e.target.value; renderList(); renderMarkers();
        };

        function fitAll() {
            const pts = schools.filter(s => s.latitudine && s.longitudine);
            if (pts.length) map.fitBounds(L.latLngBounds(pts.map(s => [s.latitudine, s.longitudine])), { padding: [40, 40] });
        }

        // ── DATA — sostituisci questo array con il tuo JSON ──────────────────────────
        const DATA = [

            {

            },
            {

            },
            {

            },
            {

        // ── LOAD DATA ─────────────────────────────────────────────────────────────────
        function loadData(data) {
            schools = data.map((s, i) => ({ ...s, _id: i }));

            // Build district color map
            const dists = [...new Set(schools.map(s => s.distretto))].sort();
            dists.forEach((d, i) => { DC[d] = PAL[i % PAL.length]; });

            // District filter buttons
            document.getElementById('fgrid').innerHTML = dists
                .map(d => `<button class="db" data-d="${d}" onclick="togDist('${d}')">${d}</button>`)
                .join('');

            document.getElementById('sdist').textContent = dists.length;
            renderList(); renderMarkers(); fitAll();
        }

        loadData(DATA);
    </script>
